name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      # Install .NET 10 SDK
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Build your project yourself (instead of Azure doing it)
      - name: Build WASM App
        run: dotnet publish AllMultiplayerGames.WebAssembly/AllMultiplayerGames.WebAssembly.csproj -c Release -o build_output

      # Deploy ONLY the static files (Skip Azure build)
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PURPLE_CLIFF_06EC86E1E }}
          action: upload
          app_location: "build_output/wwwroot"   # This is now the published output
          api_location: ""                       # Disable API so Oryx won't try to build it
          skip_app_build: true                   # <-- IMPORTANT
          skip_api_build: true                   # <-- IMPORTANT

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PURPLE_CLIFF_06EC86E1E }}
          action: close